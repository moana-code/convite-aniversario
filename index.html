<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Aniversário 🎉</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 350px;
    }

    h1 {
      color: #ff4b5c;
    }

    .highlight {
      font-size: 24px;
      margin: 10px 0;
      color: #333;
    }

    .details {
      margin-top: 15px;
      color: #666;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: #ff4b5c;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    .btn:hover {
      background: #e63e50;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>🎉 Você está convidada! 🎉</h1>
  
  <p class="highlight">Meu aniversário de 25 anos 💖</p>
  
  <div class="details">
    📅 Data: 20 de Junho<br>
    ⏰ Hora: 12h<br>
    📍 Local: Alô Grau
  </div>

  <button class="btn" onclick="alert('Te espero lá! 💕')">
    Confirmar presença
  </button>
</div>

</body>
</html>
